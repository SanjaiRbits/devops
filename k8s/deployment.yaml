apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest
  template:
    metadata:
      labels:
        app: aceest
    spec:
      containers:
        - name: aceest
          image: sanjai99/2024tm93548:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000