apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-stable
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aceest
      track: stable
  template:
    metadata:
      labels:
        app: aceest
        track: stable
    spec:
      containers:
        - name: aceest
          image: aceest:jenkins
          imagePullPolicy: Never
          ports:
            - containerPort: 8000