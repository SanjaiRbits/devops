apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest
      track: canary
  template:
    metadata:
      labels:
        app: aceest
        track: canary
    spec:
      containers:
        - name: aceest
          image: aceest:jenkins
          imagePullPolicy: Never
          ports:
            - containerPort: 8000